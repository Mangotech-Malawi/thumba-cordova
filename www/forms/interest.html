<div class="container-fluid">
    <div class="card">
        <div class="card-header bg-gradient-primary">
            <h3 id="formTitle" class="card-title font-weight-bold">
                <i class="nav-icon fas fa-piggy-bank  "></i>Add Loan Product
            </h3>
            <div class="row">
                <div class="col-sm-12 col-md-12 col-lg-12 text-right">
                    <button type="button" class="btn btn-outline-light text-left" id="loanProductBackBtn"
                        data-client-type="individual">
                        <i class="fa fa-arrow-left"></i> Back
                    </button>
                </div>
            </div>

        </div>
        <!-- /.card-header -->
        <div class="card-body card-theme">
            <div class="container mt-3">
                <div class="card card-secondary">
                    <div class="card-body">
                        <form id="loanProductForm">
                            <input id="interestId" type="hidden" class="form-control">

                            <!-- Step 1: Basic Information -->
                            <div id="step1" class="step active">
                                <h4 class="mb-4">Basic Information</h4>
                                <div class="row">
                                    <div class="col-lg-12 col-md-12 col-sm-12 mb-3">
                                        <div class="form-group ">
                                            <label>Name</label>
                                            <div class="input-group ">
                                                <input id="name" type="text" class="form-control" placeholder="Name">
                                                <div class="input-group-append">
                                                    <div class="input-group-text">
                                                        <span class="fas fa-coins"></span>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <div class="col-lg-12 col-md-12 col-sm-12 mb-3">
                                        <div class="form-group ">
                                            <label>Period</label>
                                            <div class="input-group ">
                                                <input id="period" type="text" class="form-control"
                                                    placeholder="Period">
                                                <div class="input-group-append">
                                                    <div class="input-group-text">
                                                        <span class="fas fa-calendar"></span>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <div class="col-lg-12 col-md-12 col-sm-12 mb-3">
                                        <div class="form-group ">
                                            <label>Loan Term Type</label>
                                            <div class="select2-primary">
                                                <select id="loanTermType" class="form-control"
                                                    data-placeholder="Select loan term type   "
                                                    data-dropdown-css-class="select2-primary" style="width: 100%;">
                                                    <option value="years">Years</option>
                                                    <option value="months">Months</option>
                                                    <option value="weeks">Weeks</option>
                                                </select>
                                            </div>
                                        </div>
                                    </div>

                                    <div class="col-lg-12 col-md-12 col-sm-12 mb-3">
                                        <div class="form-group ">
                                            <label>Max Amount (MwK)</label>
                                            <div class="input-group ">
                                                <input id="max" type="text" class="form-control" placeholder="Max">
                                                <div class="input-group-append">
                                                    <div class="input-group-text">
                                                        <span class="fas fa-money-bill-alt"></span>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="col-lg-12 col-md-12 col-sm-12 mb-3">
                                        <div class="form-group ">
                                            <label>Min Amount (MwK)</label>
                                            <div class="input-group ">
                                                <input id="min" type="text" class="form-control" placeholder="Min">
                                                <div class="input-group-append">
                                                    <div class="input-group-text">
                                                        <span class="fas fa-money-bill-alt"></span>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div class="btn-navigation text-right">
                                    <button type="button" class="btn btn-primary" onclick="nextStep(1)">Next <i
                                            class="fas fa-arrow-right"></i></button>
                                </div>
                            </div>

                            <!-- Step 2: Rate & Payment Settings -->
                            <div id="step2" class="step">
                                <h4 class="mb-4">Rate & Payment Settings</h4>
                                <div class="row">
                                    <div class="col-lg-12 col-md-12 col-sm-12 mb-3">
                                        <div class="form-group ">
                                            <label>Rate Type</label>
                                            <div class="select2-primary">
                                                <select id="rateType" class="form-control"
                                                    data-placeholder="Select rate type   "
                                                    data-dropdown-css-class="select2-primary" style="width: 100%;">
                                                    <option value="annual" selected="true">Annual</option>
                                                    <option value="semi-annually">Semi-Annually</option>
                                                    <option value="quarterly">Quarterly</option>
                                                    <option value="monthly">Monthly</option>
                                                    <option value="weekly">Weekly</option>
                                                </select>
                                            </div>
                                        </div>
                                    </div>

                                    <div class="col-lg-12 col-md-12 col-sm-12 mb-3">
                                        <div class="form-group ">
                                            <label>Rate (%)</label>
                                            <div class="input-group ">
                                                <input id="rate" type="text" class="form-control" placeholder="Rate">
                                                <div class="input-group-append">
                                                    <div class="input-group-text">
                                                        <span class="fas fa-percent"></span>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <div class="col-lg-12 col-md-12 col-sm-12 mb-3">
                                        <div class="form-group ">
                                            <label>Compounding Frequency</label>
                                            <div class="input-group ">
                                                <input id="compoundingFrequency" type="text" class="form-control"
                                                    placeholder="Compounding Frequency">
                                                <div class="input-group-append">
                                                    <div class="input-group-text">
                                                        <span class="fas fa-percent"></span>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <div class="col-lg-12 col-md-12 col-sm-12 mb-3">
                                        <div class="form-group ">
                                            <label>Payment Frequency</label>
                                            <div class="select2-primary">
                                                <select id="paymentFrequency" class="form-control"
                                                    data-placeholder="Select loan term type   "
                                                    data-dropdown-css-class="select2-primary" style="width: 100%;">
                                                    <option value="daily">Daily</option>
                                                    <option value="weekly">Weekly</option>
                                                    <option value="monthly">Monthly</option>
                                                    <option value="semi-annually">Semi-annually</option>
                                                    <option value="annually">Annually</option>
                                                </select>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div class="btn-navigation">
                                    <button type="button" class="btn btn-secondary" onclick="prevStep(2)"><i
                                            class="fas fa-arrow-left"></i> Previous</button>
                                    <button type="button" class="btn btn-primary float-right" onclick="nextStep(2)">Next
                                        <i class="fas fa-arrow-right"></i></button>
                                </div>
                            </div>

                            <!-- Step 3: Disbursement & Advanced -->
                            <div id="step3" class="step">
                                <h4 class="mb-4">Disbursement & Advanced Settings</h4>
                                <div class="row">
                                    <div class="col-lg-12 col-md-12 col-sm-12 mb-3">
                                        <div class="form-group ">
                                            <label>Disbursement Type</label>
                                            <div class="select2-primary">
                                                <select id="disbursementType" class="form-control"
                                                    data-placeholder="Select loan term type   "
                                                    data-dropdown-css-class="select2-primary" style="width: 100%;">
                                                    <option value="full">Full</option>
                                                    <option value="partial">Partial</option>
                                                </select>
                                            </div>
                                        </div>
                                    </div>

                                    <div class="col-lg-12 col-md-12 col-sm-12 mb-3">
                                        <div class="form-group ">
                                            <label>Maximum Disbursement Percentage (%)</label>
                                            <div class="input-group ">
                                                <input id="maximumDisbursementPercentage" type="text"
                                                    class="form-control" placeholder="Maximum Disbursement Percentage">
                                                <div class="input-group-append">
                                                    <div class="input-group-text">
                                                        <span class="fas fa-percent"></span>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <div class="col-lg-12 col-md-12 col-sm-12 mb-3">
                                        <div class="form-group ">
                                            <label>Minimum Disbursement Percentage (%)</label>
                                            <div class="input-group ">
                                                <input id="minimumDisbursementPercentage" type="text"
                                                    class="form-control" placeholder="Minimum Disbursement Percentage">
                                                <div class="input-group-append">
                                                    <div class="input-group-text">
                                                        <span class="fas fa-percent"></span>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <div class="col-lg-12 col-md-12 col-sm-12 mb-3">

                                        <div class="form-group ">
                                            <label>Grace Period (Weeks)</label>
                                            <div class="input-group ">
                                                <input id="gracePeriod" type="text" class="form-control"
                                                    placeholder="Grace Period">
                                                <div class="input-group-append">
                                                    <div class="input-group-text">
                                                        <span class="fas fa-calendar"></span>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>


                                    <div class="col-lg-12 col-md-12 col-sm-12 mb-3">
                                        <div class="form-group ">
                                            <label>Accumulation Amount</label>
                                            <div class="input-group ">
                                                <input id="accumAmount" type="text" class="form-control"
                                                    placeholder="Accum Amount">
                                                <div class="input-group-append">
                                                    <div class="input-group-text">
                                                        <span class="fas fa-money-bill-alt"></span>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <div class="col-lg-12 col-md-12 col-sm-12 mb-3">
                                        <div class="form-group ">
                                            <label>Accumulation Period (Days)</label>
                                            <div class="input-group">
                                                <input id="accumDays" type="text" class="form-control"
                                                    placeholder="Accum Days">
                                                <div class="input-group-append">
                                                    <div class="input-group-text">
                                                        <span class="fas fa-calendar"></span>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>


                                </div>
                                <div class="btn-navigation">
                                    <button type="button" class="btn btn-secondary" onclick="prevStep(3)"><i
                                            class="fas fa-arrow-left"></i> Previous</button>
                                    <button type="button" class="btn btn-primary float-right" onclick="nextStep(3)">Next
                                        <i class="fas fa-arrow-right"></i></button>
                                </div>
                            </div>

                            <!-- Step 4: Score Names & Scores -->
                            <div id="step4" class="step">
                                <h4 class="mb-4 ">Loan Product Composite Score Settings</h4>
                                <div class="row">
                                    <div class="col-12">
                                        <div id="scoresContainer"></div>

                                        <button type="button" id="addScoreRowBtn" class="btn btn-primary">
                                            <i class="fas fa-plus"></i> Add Score
                                        </button>
                                    </div>
                                </div>
                                <div class="btn-navigation">
                                    <button type="button" class="btn btn-secondary" onclick="prevStep(4)"><i
                                            class="fas fa-arrow-left"></i> Previous</button>
                                    <button type="button" id="saveInterestBtn" class="btn btn-success float-right">Save
                                        <i class="fas fa-save"></i></button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
<style>
    .score-item {
        padding: 15px;
        margin-bottom: 10px;
        border-radius: 5px;
    }
</style>
<script>

    $(document).ready(function () {
        // Initialize select2 dropdowns
        $('#loanTermType').select2();
        $('#rateType').select2();
        $('#paymentFrequency').select2();
        $('#disbursementType').select2();
    });

    function nextStep(currentStep) {
        // Basic validation (you can enhance this)
        if (validateStep(currentStep)) {
            $(`#step${currentStep}`).removeClass('active');
            $(`#step${currentStep + 1}`).addClass('active');
        }
    }

    function prevStep(currentStep) {
        $(`#step${currentStep}`).removeClass('active');
        $(`#step${currentStep - 1}`).addClass('active');
    }

    function validateStep(step) {
        // Simple validation example
        let isValid = true;
        $(`#step${step} input[required], #step${step} select[required]`).each(function () {
            if (!$(this).val()) {
                $(this).addClass('is-invalid');
                isValid = false;
            } else {
                $(this).removeClass('is-invalid');
            }
        });
        return isValid;
    }

    // Function to toggle max/min percentage fields
    function toggleDisbursementFields() {
        const disbursementType = $("#disbursementType").val();
        if (disbursementType === "partial") {
            $("#maximumDisbursementPercentage").closest(".col-lg-12").show();
            $("#minimumDisbursementPercentage").closest(".col-lg-12").show();
        } else {
            $("#maximumDisbursementPercentage").closest(".col-lg-12").hide();
            $("#minimumDisbursementPercentage").closest(".col-lg-12").hide();
        }
    }

    // Initial check
    $(document).ready(function () {
        toggleDisbursementFields();
    });

    // On change
    $("#disbursementType").on("change", function () {
        toggleDisbursementFields();
    });
</script>
