<div class="container-fluid">
    <div class="card">
        <div class="card-header bg-gradient-primary">
            <h3 class="card-title">Installment Arrears</h3>
        </div>
        <!-- /.card-header -->
        <div class="card-body">
            <!-- Bulk Assignment Section -->
            <div class="d-flex justify-content-end mb-3">
                <div class="input-group" style="width: 450px;">
                    <select id="bulkCollectorSelect" class="form-control" style="width: 60%;">
                        <option value="">-- Select Collector for Bulk Assign --</option>
                    </select>
                    <div class="input-group-append">
                        <button type="button" id="bulkAssignBtn" class="btn btn-warning" disabled>
                            <i class="fas fa-users-cog mr-1"></i> Assign Selected
                        </button>
                    </div>
                </div>
            </div>

            <table id="installmentArrearsTable" class="table table-striped table-hover">
                <thead>
                    <tr>
                        <th class="text-sm no-sort" style="width: 10px;"><input type="checkbox" id="selectAllArrears"></th>
                        <th class="text-sm">ID</th>
                        <th class="text-sm">Client Name</th>
                        <th class="text-sm">Identifier</th>
                        <th class="text-sm">Installment #</th>
                        <th class="text-sm">Total Arrears (MWK)</th>
                        <th class="text-sm">Days Overdue</th>
                        <th class="text-sm">Category</th>
                        <th class="text-sm">Status</th>
                        <th class="text-sm no-sort">Action</th>
                    </tr>
                </thead>
                <tbody>
                </tbody>
            </table>
        </div>
        <!-- /.card-body -->
    </div>
    <!-- /.card -->
</div>
