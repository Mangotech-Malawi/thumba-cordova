name: Electron Build

on:
  push:
    branches: [ main ]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Cordova
        run: npm install -g cordova

      - name: Install dependencies
        run: npm install

      - name: Install electron-builder
        run: npm install --save-dev electron-builder

      - name: Add Electron platform
        run: cordova platform add electron

      - name: Build Electron
        run: cordova build electron

      - name: Build installers
        run: npx electron-builder --publish never
        working-directory: platforms/electron

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: electron-linux-build
          path: platforms/electron/dist/

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Cordova
        run: npm install -g cordova

      - name: Install dependencies
        run: npm install

      - name: Install electron-builder
        run: npm install --save-dev electron-builder

      - name: Add Electron platform
        run: cordova platform add electron

      - name: Build Electron
        run: cordova build electron

      - name: Build installers
        run: npx electron-builder --publish never
        working-directory: platforms/electron

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: electron-macos-build
          path: platforms/electron/dist/

